[ballerina.http.accessLogConfig]
format = "flat"
attributes = ["ip", "date_time", "request", "status", "response_body_size", "http_referrer", "http_user_agent"] 
path = "./build/tmp/output/time-based-access.log"

[ballerina.http.accessLogConfig.rotation]
policy = "TIME_BASED"
maxAge = 3
maxBackupFiles = 3
