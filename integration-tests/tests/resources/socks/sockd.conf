# Dante SOCKS server configuration for the HTTP client SOCKS-proxy integration test.
# Accepts SOCKS4/SOCKS5 with no authentication and relays to the in-compose `backend` service.
# Proxy authentication, the SOCKS4 client-side-DNS path, and TLS are covered by the native tests.

logoutput: stderr

internal: 0.0.0.0 port = 9913
external: eth0

clientmethod: none
socksmethod: none

user.privileged: root
user.unprivileged: nobody

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error connect disconnect
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error connect disconnect
}
