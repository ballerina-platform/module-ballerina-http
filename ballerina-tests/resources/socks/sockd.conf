# Dante SOCKS server configuration for HTTP client SOCKS-proxy tests.
#
# Accepts SOCKS4 and SOCKS5 with no proxy authentication (socksmethod: none). Proxy
# authentication (SOCKS5 username/password, SOCKS4 user id) and the SOCKS4 client-side-DNS
# path are exercised by the native Java tests (Socks4/Socks5ProxyServerTestCase); this server
# only needs to prove end-to-end SOCKS5 relaying for the Ballerina client.
#
# Listens on the published proxy port and relays to the backend Ballerina services running on
# the host (reached via host.docker.internal — see compose.yml).

logoutput: stderr

# Accept proxy clients on the published proxy port (1080 is the standard SOCKS port and is
# outside the Ballerina test listener range, so it never collides with test service ports).
internal: 0.0.0.0 port = 1080
# Relay outbound connections through the container's external interface.
external: eth0

# No authentication for either the client handshake or the SOCKS request.
clientmethod: none
socksmethod: none

user.privileged: root
user.unprivileged: nobody

# Allow any client to connect to the proxy.
client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error connect disconnect
}

# Allow relaying to any destination.
socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error connect disconnect
}
